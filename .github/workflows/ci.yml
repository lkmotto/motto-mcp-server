name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev,doppler]"
      - name: Smoke import
        run: python -c "import mcp_server; from mcp_server import server, db; print('ok')"
      - name: Smoke import (servers/doppler)
        run: python -c "from servers.doppler import build_server; print('ok')"
      - name: Lint (servers/)
        run: ruff check servers
      - name: Pytest
        run: pytest servers -q

      # Posts the last 250 log lines of any failed step in this run as a sticky
      # PR comment so Claude sessions (which can't reach Actions logs from inside
      # the harness) can debug failures via mcp__github__pull_request_read
      # method=get_comments. Single comment per PR, upserts on re-run.
      - name: Post CI failure to PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: jobsResp } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const failedJobs = jobsResp.jobs.filter(j =>
              j.conclusion === 'failure' ||
              (j.steps || []).some(s => s.conclusion === 'failure')
            );
            if (failedJobs.length === 0) return;

            const sha = context.sha.slice(0, 7);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = '<!-- ci-failure-comment -->';
            let body = `${marker}\n## ❌ CI failure on ${sha}\n\n[Full run](${runUrl})\n\n`;

            for (const job of failedJobs) {
              const failedStep = (job.steps || []).find(s => s.conclusion === 'failure');
              body += `### \`${job.name}\` — failed step: \`${failedStep ? failedStep.name : 'unknown'}\`\n\n`;
              try {
                const res = await github.request(
                  'GET /repos/{owner}/{repo}/actions/jobs/{job_id}/logs',
                  { owner: context.repo.owner, repo: context.repo.repo, job_id: job.id }
                );
                const text = typeof res.data === 'string'
                  ? res.data
                  : Buffer.from(res.data).toString('utf-8');
                const tail = text.split('\n').slice(-250).join('\n');
                body += `<details><summary>Last 250 log lines</summary>\n\n~~~\n${tail}\n~~~\n</details>\n\n`;
              } catch (e) {
                body += `_could not fetch log: ${e.message}_\n\n`;
              }
            }

            const prNumber = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
